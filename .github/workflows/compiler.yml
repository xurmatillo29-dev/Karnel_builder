name: Build Custom Kernel (Xiaomi 12 Lite)

on:
  workflow_dispatch: # Bu tugma yordamida kompilyatsiyani qo'lda boshlaysiz

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32ncurses5-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

    - name: Download Clang Toolchain
      run: |
        mkdir clang
        cd clang
        curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r522817.tar.gz
        tar -xf clang-r522817.tar.gz

    - name: Clone Kernel Source
      run: |
        # Bu yerga o'zingiz o'zgartirgan (GPU overclock qilingan) kernel kodini yozasiz
        git clone https://github.com/LineageOS/android_kernel_xiaomi_sm8350.git -b lineage-21 kernel-source

    - name: Build Kernel
      run: |
        cd kernel-source
        export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CC=clang
        
        # O'zingizning qurilmangiz defconfig faylini kiriting
        make taoyao_defconfig
        make -j$(nproc --all)

    - name: Upload Kernel Image
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-Kernel
        path: kernel-source/arch/arm64/boot/Image
