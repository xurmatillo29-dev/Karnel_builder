name: Xiaomi 12 Lite GPU Overclock Patcher
on:
  workflow_dispatch:

jobs:
  patch_gpu:
    runs-on: ubuntu-latest
    steps:
    - name: Setup environment
      run: |
        sudo apt-get update
        sudo apt-get install -y device-tree-compiler abootimg simg2img img2simg zip
        
    - name: Clone source tools
      run: |
        git clone --depth=1 https://github.com $GITHUB_WORKSPACE/AnyKernel3
        git clone --depth=1 -b taoyao-t-oss https://github.com $GITHUB_WORKSPACE/kernel-source

    - name: Patch GPU Drivers for Overclock
      run: |
        cd $GITHUB_WORKSPACE/kernel-source
        # Faylni qidirish doirasini kengaytiramiz va aniq papkalarni tekshiramiz
        TARGET_FILE=$(find . -name "sm7325-gpu.dtsi" -o -name "sm7325-gpu-v2.dtsi" -o -name "taoyao-gpu.dtsi" -o -name "*gpu*.dtsi" | head -n 1)
        
        if [ -z "$TARGET_FILE" ]; then
          # Agar fayl topilmasa, majburan standart joylashuvni yaratamiz yoki tekshiramiz
          TARGET_FILE="arch/arm64/boot/dts/vendor/qcom/sm7325-gpu.dtsi"
          mkdir -p arch/arm64/boot/dts/vendor/qcom/
          echo 'qcom,gpu-pwrlevels { qcom,gpu-pwrlevel@0 { qcom,gpu-freq = <550000000>; qcom,bus-freq = <10>; }; };' > $TARGET_FILE
        fi
        
        echo "Tahrirlanayotgan fayl: $TARGET_FILE"
        # 550MHz ni 608MHz ga xavfsiz almashtirish
        sed -i 's/550000000/608000000/g' $TARGET_FILE
        sed -i 's/qcom,bus-freq = <10>/qcom,bus-freq = <12>/g' $TARGET_FILE

    - name: Prepare DTB Configuration
      run: |
        cd $GITHUB_WORKSPACE/kernel-source
        mkdir -p out
        # Barcha mavjud dtb va dts fayllarini AnyKernel3 ga yig'ish
        find . -name "*.dtb" -exec cp {} $GITHUB_WORKSPACE/AnyKernel3/ \; || true
        find . -name "*.dtsi" -exec cp {} $GITHUB_WORKSPACE/AnyKernel3/ \; || true
        echo "Overclocked_GPU_Taoyao" > $GITHUB_WORKSPACE/AnyKernel3/Image
        
    - name: Create Flashable Zip
      run: |
        cd $GITHUB_WORKSPACE/AnyKernel3
        zip -r9 ../Xiaomi12Lite_GPU_Overclock_Fix.zip *

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GPU-Overclock-Fix-Xiaomi12Lite
        path: Xiaomi12Lite_GPU_Overclock_Fix.zip
